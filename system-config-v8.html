
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA MASTER | V8.2 COMMAND</title>
    <style>
        :root { --admin-red: #ba0c2f; --admin-blue: #00274c; --bg: #0f172a; --accent: #38bdf8; --card: #1e293b; }
        body { background: var(--bg); color: #f8fafc; font-family: -apple-system, system-ui, sans-serif; margin: 0; font-size: 13px; }
        
        #loader { position: fixed; top:0; left:0; width:100%; height:3px; background: var(--accent); z-index: 1000; display: none; }

        .sticky-header { position: sticky; top: 0; z-index: 100; background: var(--card); border-bottom: 2px solid var(--admin-red); }
        .stats-bar { display: flex; justify-content: space-around; background: #000; padding: 6px; font-size: 10px; color: var(--accent); font-weight: bold; }

        .tab-bar { display: flex; border-top: 1px solid #334155; }
        .tab-item { flex: 1; padding: 14px; text-align: center; font-size: 11px; font-weight: bold; cursor: pointer; color: #94a3b8; position: relative; }
        .tab-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: rgba(56, 189, 248, 0.05); }
        
        .nav-badge { position: absolute; top: 5px; right: 20%; background: var(--admin-red); color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 900; }

        .view-section { display: none; padding: 10px; animation: slideIn 0.2s ease-out; }
        .view-section.active { display: block; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; outline: none; }
        .search-box:focus { border-color: var(--accent); }

        .user-card { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #334155; }
        .user-main { display: flex; justify-content: space-between; align-items: center; }
        .bal { color: #10b981; font-weight: bold; }

        .req-item { background: #fff; color: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #f59e0b; }
        .img-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; margin: 5px 0; }

        .chat-card { background: var(--card); border-radius: 8px; margin-bottom: 12px; overflow: hidden; border: 1px solid #334155; }
        .chat-header { padding: 10px 12px; background: #1e293b; cursor: pointer; font-weight: bold; }
        .chat-history { height: 180px; overflow-y: auto; padding: 10px; background: #1e293b; display: none; }
        .reply-box { padding: 8px; display: none; gap: 5px; background: #1e293b; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; margin-bottom: 6px; }
        .msg.admin { background: var(--admin-blue); color: white; align-self: flex-end; }
        .msg.user { background: #475569; color: white; align-self: flex-start; }

        .unread-badge { background: #ef4444; color: white; font-size: 10px; padding: 2px 6px; border-radius: 9999px; }

        .btn { padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-green { background: #10b981; color: white; }
        .btn-gray { background: #64748b; color: white; }
        .math-btn { background: #38bdf8; color: #0f172a; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader"></div>

    <div class="sticky-header">
        <div class="stats-bar">
            <span>USERS: <span id="stat-users">0</span></span>
            <span>TASKS: <span id="stat-reqs">0</span></span>
            <span>VAULT: <span id="stat-cash">$0</span></span>
        </div>
        <div style="padding: 12px; text-align: center;">
            <b style="letter-spacing: 1px; font-size: 15px;">COMMAND V8.2 | MASTER</b>
        </div>
        <div class="tab-bar">
            <div class="tab-item active" onclick="switchTab('tasks')">TASKS <span id="taskCount" class="nav-badge" style="display:none">0</span></div>
            <div class="tab-item" onclick="switchTab('users')">CLIENTS</div>
            <div class="tab-item" onclick="switchTab('chats')">CHATS <span id="chatBadge" class="nav-badge" style="display:none">0</span></div>
        </div>
    </div>

    <div id="section-tasks" class="view-section active">
        <div id="requestFeed"></div>
    </div>

    <div id="section-users" class="view-section">
        <input type="text" id="userSearch" class="search-box" placeholder="Search by name or email..." onkeyup="doSearch()">
        <div id="userList"></div>
    </div>

    <div id="section-chats" class="view-section">
        <div id="chatFeed"></div>
    </div>

    <!-- Chat Overlay -->
    <div id="chatOverlay" style="position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column;">
        <div style="background:var(--card); padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #334155;">
            <div>
                <b id="activeChatUser" style="font-size:16px;"></b><br>
                <small style="color:var(--accent)">Secure Support</small>
            </div>
            <button onclick="closeChat()" style="background:none;border:none;color:white;font-size:28px;">✕</button>
        </div>
        <div id="chatStream" style="flex:1; overflow-y:auto; padding:15px; background:#1e293b; display:flex; flex-direction:column; gap:8px;"></div>
        <div style="padding:12px; background:var(--card); border-top:1px solid #334155; display:flex; gap:8px;">
            <input type="text" id="chatInput" style="flex:1; padding:12px; border-radius:9999px; border:1px solid #334155; background:#0f172a; color:white;" placeholder="Type reply...">
            <button onclick="sendReply()" class="btn" style="background:#10b981; color:white; border-radius:9999px; padding:0 20px;">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, getDoc, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5nOOx153po4nWh4irbmTAcxsCZaM1-9k",
            authDomain: "sba-grant-2026.firebaseapp.com",
            projectId: "sba-grant-2026",
            storageBucket: "sba-grant-2026.firebasestorage.app",
            messagingSenderId: "838430821326",
            appId: "1:838430821326:web:6438deacb334076a64f99f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activeUID = null, activeName = null, allUsers = [];

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "liger4683@gmail.com") {
                document.getElementById('adminEmail').innerText = user.email;
                initApp();
            } else { 
                window.location.href = "index.html"; 
            }
        });

        function showLoader(show) { 
            // You can add a loader element if needed
        }

        function initApp() {
            // Users
            onSnapshot(collection(db, "users"), (snap) => {
                allUsers = [];
                let totalCash = 0;
                const list = document.getElementById('userList');
                list.innerHTML = "";
                
                snap.forEach(d => {
                    const u = d.data();
                    const bal = parseFloat(u.balance) || 0;
                    totalCash += bal;
                    allUsers.push({id: d.id, ...u});
                    
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `
                        <div class="user-main" onclick="this.parentElement.classList.toggle('active')">
                            <div class="user-info">
                                <b>${u.fullName || 'User'}</b>
                                <div class="bal">\[ {bal.toLocaleString()}</div>
                            </div>
                            <button class="math-btn" onclick="event.stopPropagation(); window.doMath('${d.id}')">±</button>
                        </div>
                        <div class="user-details" style="display:none; margin-top:8px; padding-top:8px; border-top:1px dashed #475569;">
                            Email: <span style="color:#fff">${u.email}</span><br>
                            KYC: <span style="color:#38bdf8">${u.kycStatus || 'NOT STARTED'}</span><br>
                            ID: ${d.id}
                        </div>`;
                    list.appendChild(card);
                });
                
                document.getElementById('stat-users').innerText = snap.size;
                document.getElementById('stat-cash').innerText = "$" + totalCash.toLocaleString();
            });

            // Tasks
            onSnapshot(collection(db, "requests"), (snap) => {
                const feed = document.getElementById('requestFeed');
                let count = 0;
                feed.innerHTML = "";
                
                snap.forEach(d => {
                    const r = d.data();
                    if(r.status !== "PENDING") return;
                    count++;
                    const isKyc = r.type && r.type.includes("KYC");
                    
                    feed.innerHTML += `
                        <div class="req-item">
                            <div style="font-size:10px; color:#64748b;">${r.userName}</div>
                            <div style="font-weight:bold; font-size:14px;">${r.type}</div>
                            <h2> \]{parseFloat(r.amount || 0).toLocaleString()}</h2>
                            ${isKyc ? `
                                <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                                    <img src="${r.frontImg}" class="img-preview" onclick="window.open(this.src)">
                                    <img src="${r.backImg}" class="img-preview" onclick="window.open(this.src)">
                                </div>` : ''}
                            <div style="display:flex; gap:5px; margin-top:10px;">
                                <button onclick="window.processTask('\( {d.id}', ' \){r.userId}', 'APPROVE', '${r.type}', ${r.amount || 0})" class="btn btn-green" style="flex:1">APPROVE</button>
                                <button onclick="window.processTask('\( {d.id}', ' \){r.userId}', 'REJECT', '${r.type}', ${r.amount || 0})" class="btn btn-gray" style="flex:1">REJECT</button>
                                \( {isKyc ? `<button onclick="window.resendKYC(' \){d.id}', '${r.userId}')" class="btn btn-gray" style="flex:1">RESEND</button>` : ''}
                            </div>
                        </div>`;
                });
                
                document.getElementById('stat-reqs').innerText = count;
                document.getElementById('taskCount').innerText = count;
                document.getElementById('taskCount').style.display = count > 0 ? 'inline' : 'none';
            });

            // Chats
            onSnapshot(query(collection(db, "support_tickets"), orderBy("timestamp", "asc")), (snap) => {
                const chatFeed = document.getElementById('chatFeed');
                const groups = {};
                snap.forEach(sDoc => {
                    const m = sDoc.data();
                    if (!m.userId) return;
                    if (!groups[m.userId]) {
                        groups[m.userId] = { name: m.userName || "User", msgs: [], unread: 0 };
                    }
                    groups[m.userId].msgs.push(m);
                    if (m.sender === 'USER') groups[m.userId].unread++;
                });
                
                chatFeed.innerHTML = "";
                let totalChats = 0;
                
                Object.keys(groups).forEach(uid => {
                    totalChats++;
                    const g = groups[uid];
                    const unread = g.unread > 0 ? `<span class="unread-badge">${g.unread}</span>` : '';
                    
                    const div = document.createElement('div');
                    div.className = 'chat-card';
                    div.innerHTML = `
                        <div class="chat-header" onclick="toggleChat(this)">
                            <div>${g.name.toUpperCase()} ${unread}</div>
                            <span style="font-size:10px; color:#94a3b8;">${g.msgs.length} msgs</span>
                        </div>
                        <div class="chat-history" id="chat-box-${uid}">
                            ${g.msgs.map(m => `<div class="msg \( {m.sender === 'ADMIN' ? 'admin' : 'user'}"> \){m.message}</div>`).join('')}
                        </div>
                        <div class="reply-box" id="reply-box-${uid}">
                            <input type="text" id="reply-input-${uid}" placeholder="Type reply..." style="flex:1">
                            <button onclick="window.adminReply('\( {uid}', ' \){g.name}')" class="btn btn-green">SEND</button>
                        </div>
                    `;
                    chatFeed.appendChild(div);
                });
                
                document.getElementById('chatBadge').innerText = Object.values(groups).filter(g => g.unread > 0).length;
                document.getElementById('chatBadge').style.display = 'inline';
            });
        }

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-item, .view-section').forEach(el => el.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`section-${tab}`).classList.add('active');
        };

        window.doSearch = () => {
            const val = document.getElementById('userSearch').value.toLowerCase();
            const list = document.getElementById('userList');
            list.innerHTML = "";
            allUsers.filter(u => 
                (u.fullName || '').toLowerCase().includes(val) || 
                (u.email || '').toLowerCase().includes(val)
            ).forEach(u => {
                // Reuse the same card rendering
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="user-main" onclick="this.parentElement.classList.toggle('active')">
                        <div class="user-info">
                            <b>${u.fullName || 'User'}</b>
                            <div class="bal">\[ {parseFloat(u.balance || 0).toLocaleString()}</div>
                        </div>
                        <button class="math-btn" onclick="event.stopPropagation(); window.doMath('${u.id}')">±</button>
                    </div>
                    <div class="user-details" style="display:none; margin-top:8px; padding-top:8px; border-top:1px dashed #475569;">
                        Email: <span style="color:#fff">${u.email}</span><br>
                        KYC: <span style="color:#38bdf8">${u.kycStatus || 'NOT STARTED'}</span><br>
                        ID: ${u.id}
                    </div>`;
                list.appendChild(card);
            });
        };

        window.toggleChat = function(header) {
            const history = header.nextElementSibling;
            const replyBox = history.nextElementSibling;
            if (history.style.display === 'none' || history.style.display === '') {
                history.style.display = 'block';
                replyBox.style.display = 'flex';
                header.style.background = '#334155';
            } else {
                history.style.display = 'none';
                replyBox.style.display = 'none';
                header.style.background = '#1e293b';
            }
        };

        function openChat(uid, name) {
            activeUID = uid;
            activeName = name;
            document.getElementById('activeChatUser').innerText = name;
            document.getElementById('chatOverlay').style.display = "flex";
        }

        window.closeChat = () => {
            document.getElementById('chatOverlay').style.display = "none";
        };

        window.sendReply = async () => {
            const input = document.getElementById('chatInput');
            if (!input.value.trim() || !activeUID) return;
            await addDoc(collection(db, "support_tickets"), {
                userId: activeUID,
                userName: activeName,
                message: input.value.trim(),
                sender: "ADMIN",
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

        // Keep all your original functions
        window.doMath = async (uid) => { /* your original code */ 
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);
            const currentBal = parseFloat(userSnap.data().balance) || 0;
            const val = prompt(`Edit ${userSnap.data().fullName}\nCurrent: \]{currentBal}\n\nAdd or Subtract:`, "0");
            if(val !== null && !isNaN(val)) await updateDoc(userRef, { balance: currentBal + parseFloat(val) });
        };

        window.processTask = async (docId, uid, action, type, amt) => { /* your original code */ 
            const uRef = doc(db, "users", uid);
            const rRef = doc(db, "requests", docId);
            try {
                if (action === 'APPROVE') {
                    if (type.includes("KYC")) await updateDoc(uRef, { kycStatus: "APPROVED" });
                    else {
                        const snap = await getDoc(uRef);
                        const current = parseFloat(snap.data().balance || 0);
                        if (type.includes("GRANT")) await updateDoc(uRef, { balance: current + amt });
                    }
                    await updateDoc(rRef, { status: "SUCCESSFUL" });
                } else {
                    if (type.toUpperCase().includes("TRANSFER")) {
                        const snap = await getDoc(uRef);
                        const current = parseFloat(snap.data().balance || 0);
                        await updateDoc(uRef, { balance: current + parseFloat(amt) });
                    } else if (type.includes("KYC")) {
                        await updateDoc(uRef, { kycStatus: "REJECTED" });
                    }
                    await updateDoc(rRef, { status: "DECLINED" });
                }
            } catch (e) { alert(e.message); }
        };

        window.resendKYC = async (docId, uid) => { /* your original */ 
            if(confirm("Reset KYC?")) {
                await deleteDoc(doc(db, "requests", docId));
                await updateDoc(doc(db, "users", uid), { kycStatus: "NOT_STARTED" });
            }
        };

        window.adminReply = async (uid, name) => {
            const el = document.getElementById(`reply-input-${uid}`);
            if(!el || !el.value.trim()) return;
            await addDoc(collection(db, "support_tickets"), {
                userId: uid, userName: name, message: el.value.trim(), sender: "ADMIN", timestamp: serverTimestamp()
            });
            el.value = "";
        };
    </script>
</body>
</html>
