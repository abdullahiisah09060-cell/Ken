
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA MASTER | V8.12 ULTIMATE</title>
    <style>
        :root { 
            --admin-red: #ff3b30; 
            --admin-blue: #007aff; 
            --bg: #0f172a; 
            --accent: #38bdf8; 
            --card: #1e293b; 
        }
        body { 
            background: var(--bg); 
            color: #f8fafc; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            font-size: 13px; 
        }
        
        #loader { 
            position: fixed; top:0; left:0; width:100%; height:3px; 
            background: linear-gradient(to right, var(--accent), #ff3b30); 
            z-index: 1000; display: none; 
        }

        .sticky-header { 
            position: sticky; top: 0; z-index: 100; 
            background: var(--card); border-bottom: 2px solid var(--admin-red); 
        }
        .stats-bar { 
            display: flex; justify-content: space-around; 
            background: #000; padding: 6px; font-size: 10px; 
            color: var(--accent); font-weight: bold; 
        }

        .main-container { 
            display: flex; gap: 10px; padding: 10px; 
            max-width: 1400px; margin: 0 auto; 
            height: calc(100vh - 110px); overflow: hidden;
        }
        .panel { 
            flex: 1; background: var(--card); 
            border-radius: 12px; display: flex; flex-direction: column;
            border: 1px solid #334155; overflow: hidden;
        }
        .panel-header { 
            padding: 12px 15px; background: #1e293b; 
            font-size: 12px; font-weight: bold; 
            text-transform: uppercase; color: var(--accent);
            border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }

        .panel-content { flex: 1; overflow-y: auto; padding: 10px; }

        /* Cards */
        .data-row, .req-item { 
            background: #334155; padding: 14px; 
            border-radius: 10px; margin-bottom: 10px; 
            border: 1px solid #475569; cursor: pointer;
        }
        .req-item { border-left: 5px solid #f59e0b; }
        .need-reply { border-left: 5px solid var(--admin-red); background: rgba(255, 59, 48, 0.1); }

        .kyc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .img-thumb { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; cursor: pointer; }

        .chat-row { 
            cursor: pointer; padding: 12px; border-radius: 10px; 
            background: #334155; margin-bottom: 8px;
        }
        .chat-row:hover { background: #475569; }

        /* User Detail Modal */
        #userDetailModal {
            position: fixed; inset: 0; background: rgba(15,23,42,0.98); 
            z-index: 300; display: none; flex-direction: column;
        }
        .modal-content {
            background: var(--card); margin: auto; width: 90%; max-width: 420px;
            border-radius: 12px; padding: 20px; max-height: 85vh; overflow-y: auto;
        }

        /* Chat Overlay */
        .chat-overlay { 
            position: fixed; inset: 0; background: rgba(15,23,42,0.98); 
            z-index: 200; display: none; flex-direction: column; 
        }
        .chat-body { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 12px;
            background-image: radial-gradient(#334155 1px, transparent 1px); 
            background-size: 20px 20px;
        }
        .msg { 
            max-width: 80%; padding: 12px 16px; border-radius: 18px; 
            line-height: 1.4; 
        }
        .msg.admin { align-self: flex-end; background: var(--admin-blue); color: white; }
        .msg.user { align-self: flex-start; background: #475569; color: white; }

        .btn { 
            padding: 10px 16px; border-radius: 8px; border: none; 
            font-weight: bold; cursor: pointer; 
        }
        .btn-green { background: #10b981; color: white; }
        .btn-gray { background: #64748b; color: white; }
        .btn-red { background: #ff3b30; color: white; }
        .btn-math { 
            background: var(--accent); color: #0f172a; 
            width: 38px; height: 38px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 18px; font-weight: bold;
        }
        .nav-badge { 
            background: var(--admin-red); color: white; 
            font-size: 9px; padding: 2px 7px; border-radius: 9999px; 
            font-weight: 900;
        }

        .detail-row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 13px; }
    </style>
</head>
<body>

    <div id="loader"></div>

    <div class="sticky-header">
        <div class="stats-bar">
            <span>TOTAL USERS: <span id="stat-u">0</span></span>
            <span>VAULT: <span id="stat-v">$0</span></span>
        </div>
        <div style="padding: 12px; text-align: center; font-size:15px; font-weight:bold; letter-spacing:1px;">
            COMMAND V8.12 ULTIMATE
        </div>
    </div>

    <div class="main-container">
        <!-- TASKS -->
        <div class="panel">
            <div class="panel-header">
                ⚡ ACTION REQUIRED <span id="taskCount" class="nav-badge" style="display:none">0</span>
            </div>
            <div class="panel-content" id="requestFeed"></div>
        </div>

        <!-- CLIENTS -->
        <div class="panel">
            <div class="panel-header">
                👤 CLIENTS
                <input type="text" id="userSearch" placeholder="Search..." 
                       style="background:#334155; border:none; padding:6px 10px; border-radius:6px; width:140px; font-size:12px;" 
                       onkeyup="doSearch()">
            </div>
            <div class="panel-content" id="userList"></div>
        </div>

        <!-- CHATS -->
        <div class="panel">
            <div class="panel-header">
                💬 SUPPORT CHATS <span id="chatBadge" class="nav-badge" style="display:none">0</span>
            </div>
            <div class="panel-content" id="chatList"></div>
        </div>
    </div>

    <!-- User Detail Modal -->
    <div id="userDetailModal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 id="modalUserName" style="margin:0;"></h3>
                <button onclick="closeUserModal()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
            </div>
            
            <div id="userDetailsContent"></div>

            <div style="margin-top:25px; display:flex; gap:10px; flex-wrap:wrap;">
                <button onclick="doMathCurrent()" class="btn" style="background:var(--accent); color:#0f172a; flex:1;">± BALANCE</button>
                <button onclick="manualVerifyKYC()" id="kycBtn" class="btn btn-green" style="flex:1;">VERIFY KYC</button>
                <button onclick="closeUserModal()" class="btn btn-gray" style="flex:1;">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- Chat Overlay -->
    <div id="chatOverlay" class="chat-overlay">
        <div style="background:var(--card); padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #334155;">
            <div>
                <b id="activeChatUser" style="font-size:16px;"></b><br>
                <small style="color:var(--accent)">Secure Line • Online</small>
            </div>
            <button onclick="closeChat()" style="background:none;border:none;color:white;font-size:28px;">✕</button>
        </div>
        <div class="chat-body" id="chatStream"></div>
        <div style="padding:15px; background:var(--card); border-top:1px solid #334155; display:flex; gap:10px;">
            <input type="text" id="chatInput" 
                   style="flex:1; padding:14px; border-radius:9999px; border:1px solid #475569; background:#334155; color:white; outline:none;" 
                   placeholder="Type reply...">
            <button onclick="sendReply()" class="btn btn-green" style="border-radius:9999px; padding:0 24px;">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, onSnapshot, query, orderBy, doc, updateDoc, getDoc, addDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq8CgTyNbKVbUm_GItIC7FAvTuNrNspxI",
            authDomain: "sba-portal-2026-f1253.firebaseapp.com",
            projectId: "sba-portal-2026-f1253",
            storageBucket: "sba-portal-2026-f1253.firebasestorage.app",
            messagingSenderId: "363290267220",
            appId: "1:363290267220:web:2a3e8601c11be5dd6e27c1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, {
            localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
        });

        let activeUID = null, activeName = null, allUsers = [], currentDetailUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "liger4683@gmail.com") initApp();
            else window.location.href = "index.html";
        });

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        function initApp() {
            showLoader(true);

            // Users
            onSnapshot(collection(db, "users"), (snap) => {
                allUsers = [];
                let totalV = 0;
                const list = document.getElementById('userList');
                list.innerHTML = "";

                snap.forEach(d => {
                    const u = d.data(); u.id = d.id;
                    allUsers.push(u);
                    totalV += parseFloat(u.balance || 0);
                    renderUserCard(u, list);
                });

                document.getElementById('stat-u').innerText = snap.size;
                document.getElementById('stat-v').innerText = "$" + totalV.toLocaleString();
                showLoader(false);
            });

            // Tasks (unchanged)
            const taskQuery = query(collection(db, "requests"), where("status", "==", "PENDING"), orderBy("timestamp", "desc"));
            onSnapshot(taskQuery, (snap) => {
                const feed = document.getElementById('requestFeed');
                const badge = document.getElementById('taskCount');
                feed.innerHTML = snap.empty ? '<p style="text-align:center; color:#64748b; padding:40px 20px;">No pending tasks</p>' : "";

                badge.style.display = snap.size > 0 ? "inline" : "none";
                badge.innerText = snap.size;

                feed.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    feed.innerHTML += `
                    <div class="req-item">
                        <div style="display:flex; justify-content:space-between;">
                            <small>${r.userName || 'Client'}</small>
                            <span style="color:#f59e0b; font-weight:bold;">${r.type}</span>
                        </div>
                        <h2 style="margin:8px 0; font-size:22px;">\[ {parseFloat(r.amount || 0).toLocaleString()}</h2>
                        <div class="kyc-row">
                            \( {r.frontImg ? `<img src=" \){r.frontImg}" class="img-thumb" onclick="window.open(this.src)">` : ''}
                            \( {r.backImg ? `<img src=" \){r.backImg}" class="img-thumb" onclick="window.open(this.src)">` : ''}
                        </div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button onclick="window.processTask('\( {d.id}', ' \){r.userId}', 'APPROVE', '${r.type}', ${r.amount})" class="btn btn-green" style="flex:1">APPROVE</button>
                            <button onclick="window.processTask('\( {d.id}', ' \){r.userId}', 'REJECT', '${r.type}', ${r.amount})" class="btn btn-gray" style="flex:1">REJECT</button>
                        </div>
                    </div>`;
                });
            });

            // Chats (unchanged)
            onSnapshot(query(collection(db, "support_tickets"), orderBy("timestamp", "asc")), (snap) => {
                const groups = {};
                snap.forEach(s => {
                    const m = s.data();
                    if (!groups[m.userId]) groups[m.userId] = { name: m.userName, msgs: [] };
                    groups[m.userId].msgs.push(m);
                });

                const chatList = document.getElementById('chatList');
                let unreplied = 0;
                chatList.innerHTML = "";

                Object.keys(groups).forEach(uid => {
                    const g = groups[uid];
                    const last = g.msgs[g.msgs.length - 1];
                    const waiting = last.sender !== "ADMIN";
                    if (waiting) unreplied++;

                    const div = document.createElement('div');
                    div.className = `chat-row ${waiting ? 'need-reply' : ''}`;
                    div.innerHTML = `
                        <b>${g.name}</b><br>
                        <small style="color:#94a3b8">${last.message.substring(0, 45)}...</small>
                        ${waiting ? '<span style="float:right; background:#ff3b30; color:white; font-size:10px; padding:2px 8px; border-radius:9999px;">REPLY NEEDED</span>' : ''}
                    `;
                    div.onclick = () => openChat(uid, g.name, g.msgs);
                    chatList.appendChild(div);
                });

                const badge = document.getElementById('chatBadge');
                badge.innerText = unreplied;
                badge.style.display = unreplied > 0 ? "inline" : "none";
            });
        }

        function renderUserCard(u, container) {
            const div = document.createElement('div');
            div.className = 'data-row';
            div.innerHTML = `
                <div onclick="showUserDetail('${u.id}')">
                    <b>${u.fullName || 'User'}</b><br>
                    <small style="color:#10b981"> \]{parseFloat(u.balance || 0).toLocaleString()}</small>
                </div>
                <button onclick="event.stopImmediatePropagation(); window.doMath('${u.id}')" class="btn-math">±</button>
            `;
            container.appendChild(div);
        }

        window.showUserDetail = async (uid) => {
            const userRef = doc(db, "users", uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) return;
            
            currentDetailUser = { id: uid, ...snap.data() };
            
            const content = document.getElementById('userDetailsContent');
            const kycBtn = document.getElementById('kycBtn');
            
            content.innerHTML = `
                <div class="detail-row"><span>Name:</span><span><b>${currentDetailUser.fullName || 'N/A'}</b></span></div>
                <div class="detail-row"><span>Email:</span><span>${currentDetailUser.email || 'N/A'}</span></div>
                <div class="detail-row"><span>Balance:</span><span style="color:#10b981">$${parseFloat(currentDetailUser.balance || 0).toLocaleString()}</span></div>
                <div class="detail-row"><span>KYC Status:</span><span style="color:\( {currentDetailUser.kycStatus === 'APPROVED' ? '#10b981' : '#f59e0b'}"> \){currentDetailUser.kycStatus || 'NOT STARTED'}</span></div>
                <div class="detail-row"><span>Security PIN:</span><span>${currentDetailUser.securityPin || '----'}</span></div>
                \( {currentDetailUser.idFront ? `<img src=" \){currentDetailUser.idFront}" style="width:100%; border-radius:8px; margin:10px 0;" onclick="window.open(this.src)">` : ''}
                \( {currentDetailUser.idBack ? `<img src=" \){currentDetailUser.idBack}" style="width:100%; border-radius:8px; margin:10px 0;" onclick="window.open(this.src)">` : ''}
            `;

            // Update KYC button text
            if (currentDetailUser.kycStatus === 'APPROVED') {
                kycBtn.textContent = 'REVOKE KYC';
                kycBtn.onclick = () => manualRevokeKYC();
            } else {
                kycBtn.textContent = 'VERIFY KYC';
                kycBtn.onclick = () => manualVerifyKYC();
            }

            document.getElementById('modalUserName').textContent = currentDetailUser.fullName || 'User Details';
            document.getElementById('userDetailModal').style.display = 'flex';
        };

        window.closeUserModal = () => {
            document.getElementById('userDetailModal').style.display = 'none';
            currentDetailUser = null;
        };

        window.manualVerifyKYC = async () => {
            if (!currentDetailUser) return;
            if (!confirm(`Verify KYC for ${currentDetailUser.fullName}?`)) return;
            
            showLoader(true);
            try {
                await updateDoc(doc(db, "users", currentDetailUser.id), { 
                    kycStatus: "APPROVED" 
                });
                alert("KYC manually approved!");
                closeUserModal();
            } catch (e) {
                alert("Error: " + e.message);
            }
            showLoader(false);
        };

        window.manualRevokeKYC = async () => {
            if (!currentDetailUser) return;
            if (!confirm(`Revoke KYC for ${currentDetailUser.fullName}?`)) return;
            
            showLoader(true);
            try {
                await updateDoc(doc(db, "users", currentDetailUser.id), { 
                    kycStatus: "REJECTED" 
                });
                alert("KYC revoked!");
                closeUserModal();
            } catch (e) {
                alert("Error: " + e.message);
            }
            showLoader(false);
        };

        window.doMathCurrent = () => {
            if (!currentDetailUser) return;
            window.doMath(currentDetailUser.id);
        };

        window.doSearch = () => {
            const val = document.getElementById('userSearch').value.toLowerCase();
            const list = document.getElementById('userList');
            list.innerHTML = "";
            allUsers.filter(u => 
                (u.fullName || '').toLowerCase().includes(val) || 
                (u.email || '').toLowerCase().includes(val)
            ).forEach(u => renderUserCard(u, list));
        };

        function openChat(uid, name, msgs) {
            activeUID = uid; activeName = name;
            document.getElementById('activeChatUser').innerText = name;
            document.getElementById('chatOverlay').style.display = "flex";
            renderMessages(msgs);
        }

        window.closeChat = () => {
            activeUID = null;
            document.getElementById('chatOverlay').style.display = "none";
        };

        function renderMessages(msgs) {
            const box = document.getElementById('chatStream');
            box.innerHTML = msgs.map(m => `
                <div class="msg \( {m.sender === 'ADMIN' ? 'admin' : 'user'}"> \){m.message}</div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        window.sendReply = async () => {
            const input = document.getElementById('chatInput');
            if (!input.value.trim() || !activeUID) return;
            await addDoc(collection(db, "support_tickets"), {
                userId: activeUID,
                userName: activeName,
                message: input.value.trim(),
                sender: "ADMIN",
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

        window.processTask = async (did, uid, action, type, amt) => {
            showLoader(true);
            try {
                const uRef = doc(db, "users", uid);
                const rRef = doc(db, "requests", did);
                const uSnap = await getDoc(uRef);
                const curBal = parseFloat(uSnap.data().balance || 0);

                if (action === 'APPROVE') {
                    if (type.includes("GRANT")) await updateDoc(uRef, { balance: curBal + amt });
                    if (type.includes("KYC")) await updateDoc(uRef, { kycStatus: "APPROVED" });
                    await updateDoc(rRef, { status: "SUCCESSFUL" });
                } else {
                    if (type.includes("WITHDRAW") || type.includes("TRANSFER")) {
                        await updateDoc(uRef, { balance: curBal + amt });
                    }
                    await updateDoc(rRef, { status: "DECLINED" });
                }
            } catch (e) { alert("Error: " + e.message); }
            showLoader(false);
        };

        window.doMath = async (uid) => {
            const val = prompt("Enter amount (use - to subtract):", "0");
            if (val) {
                showLoader(true);
                const uRef = doc(db, "users", uid);
                const uSnap = await getDoc(uRef);
                const cur = parseFloat(uSnap.data().balance || 0);
                await updateDoc(uRef, { balance: cur + parseFloat(val) });
                showLoader(false);
                // Refresh detail if open
                if (currentDetailUser && currentDetailUser.id === uid) {
                    showUserDetail(uid);
                }
            }
        };
    </script>
</body>
</html>
